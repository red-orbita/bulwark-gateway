# ============================================================
# Sentinel Gateway — Docker Compose (Production-Hardened)
#
# ALL secrets are loaded from files in ./secrets/ directory.
# NO .env file needed in production.
#
# First deploy:
#   ./secrets/init.sh              # Auto-generates all secrets
#   docker compose up -d           # Start core services
#   docker compose --profile monitoring up -d  # + Prometheus
#   docker compose --profile full up -d        # + Grafana
#
# Secret rotation:
#   ./secrets/init.sh --force      # Regenerate all secrets
#   docker compose restart         # Apply new secrets
# ============================================================

# --- All secrets from files (auto-generated by secrets/init.sh) ---
secrets:
  jwt_secret:
    file: ./secrets/jwt_secret.txt
  admin_jwt_secret:
    file: ./secrets/admin_jwt_secret.txt
  admin_password:
    file: ./secrets/admin_password.txt
  security_password:
    file: ./secrets/security_password.txt
  auditor_password:
    file: ./secrets/auditor_password.txt
  redis_password:
    file: ./secrets/redis_password.txt
  grafana_password:
    file: ./secrets/grafana_password.txt
  db_encryption_key:
    file: ./secrets/db_encryption_key.txt
  api_keys:
    file: ./secrets/api_keys.txt
  urlhaus_key:
    file: ./secrets/urlhaus_key.txt
  threatfox_key:
    file: ./secrets/threatfox_key.txt
  otx_key:
    file: ./secrets/otx_key.txt
  abuseipdb_key:
    file: ./secrets/abuseipdb_key.txt

services:
  # ── Proxy (Hot Path) ─────────────────────────────────────
  proxy:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${SENTINEL_PORT:-8080}:8080"
    environment:
      # Non-secret configuration only
      SENTINEL_BACKEND_URL: ${SENTINEL_BACKEND_URL:-http://host.docker.internal:8000}
      SENTINEL_FAIL_MODE: ${SENTINEL_FAIL_MODE:-closed}
      SENTINEL_LOG_FORMAT: json
      SENTINEL_LOG_LEVEL: ${SENTINEL_LOG_LEVEL:-INFO}
      SENTINEL_RATE_LIMIT_RPM: ${SENTINEL_RATE_LIMIT_RPM:-60}
      SENTINEL_WORKERS: ${SENTINEL_WORKERS:-1}
      SENTINEL_TELEMETRY_ENABLED: ${SENTINEL_TELEMETRY_ENABLED:-true}
      SENTINEL_TELEMETRY_BATCH_SIZE: ${SENTINEL_TELEMETRY_BATCH_SIZE:-100}
      SENTINEL_TELEMETRY_FLUSH_INTERVAL: ${SENTINEL_TELEMETRY_FLUSH_INTERVAL:-1.0}
      # Secrets via _FILE env vars (read from /run/secrets/)
      SENTINEL_JWT_SECRET_FILE: /run/secrets/jwt_secret
      SENTINEL_REDIS_PASSWORD_FILE: /run/secrets/redis_password
      SENTINEL_API_KEYS_FILE: /run/secrets/api_keys
      SENTINEL_URLHAUS_KEY_FILE: /run/secrets/urlhaus_key
      SENTINEL_THREATFOX_KEY_FILE: /run/secrets/threatfox_key
      SENTINEL_OTX_KEY_FILE: /run/secrets/otx_key
      SENTINEL_ABUSEIPDB_KEY_FILE: /run/secrets/abuseipdb_key
      # Redis URL without password (password injected by app from secret file)
      SENTINEL_REDIS_URL: redis://redis:6379/0
    secrets:
      - jwt_secret
      - redis_password
      - api_keys
      - urlhaus_key
      - threatfox_key
      - otx_key
      - abuseipdb_key
    volumes:
      - policies:/app/config/policies
      - ./config/iocs.json:/app/config/iocs.json:ro
      - ./config/agents.yaml:/app/config/agents.yaml:ro
      - telemetry_data:/app/data
      - siem_stats:/app/shared/siem
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    # --- Security Hardening ---
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=50m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    # pids_limit set via deploy.resources.limits
    networks:
      - app-net
      - egress-net
      - monitor-net
    deploy:
      resources:
        limits:
          memory: ${PROXY_MEMORY_LIMIT:-512M}
          cpus: "${PROXY_CPU_LIMIT:-1.0}"
        reservations:
          memory: 128M
          cpus: "0.25"

  # ── Admin Portal ─────────────────────────────────────────
  admin:
    build:
      context: .
      dockerfile: docker/Dockerfile.admin
    ports:
      - "${ADMIN_PORT:-8090}:8090"
    environment:
      # Non-secret configuration only
      ADMIN_JWT_EXPIRY_HOURS: ${ADMIN_JWT_EXPIRY_HOURS:-8}
      ADMIN_CORS_ORIGINS: ${ADMIN_CORS_ORIGINS:-}
      SENTINEL_TELEMETRY_ENABLED: ${SENTINEL_TELEMETRY_ENABLED:-true}
      SENTINEL_REDIS_URL: redis://redis:6379/0
      SENTINEL_REDIS_PASSWORD_FILE: /run/secrets/redis_password
      # Secrets via _FILE env vars
      ADMIN_JWT_SECRET_FILE: /run/secrets/admin_jwt_secret
      ADMIN_PASSWORD_FILE: /run/secrets/admin_password
      SECURITY_PASSWORD_FILE: /run/secrets/security_password
      AUDITOR_PASSWORD_FILE: /run/secrets/auditor_password
      DB_ENCRYPTION_KEY_FILE: /run/secrets/db_encryption_key
      SENTINEL_PROXY_API_KEY_FILE: /run/secrets/api_keys
    secrets:
      - admin_jwt_secret
      - admin_password
      - security_password
      - auditor_password
      - db_encryption_key
      - api_keys
      - redis_password
    volumes:
      - policies:/app/config/policies
      - ./config/siem:/app/config/siem:ro
      - ./config/agents.yaml:/app/config/agents.yaml
      - ./config/iocs.json:/app/config/iocs.json
      - admin_data:/app/data
      - siem_stats:/app/shared/siem
      - reports:/app/reports
      - ./admin/templates:/app/admin/templates:ro
      - ./admin/routes:/app/admin/routes:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8090/admin/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    # --- Security Hardening ---
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=50m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

    networks:
      - app-net
      - monitor-net
      - egress-net  # Required for host port publishing
    deploy:
      resources:
        limits:
          memory: ${ADMIN_MEMORY_LIMIT:-256M}
          cpus: "${ADMIN_CPU_LIMIT:-0.5}"

  # ── Redis (Rate Limiting + State) ───────────────────────
  redis:
    image: redis:7-alpine
    command: >
      sh -c "redis-server
      --maxmemory ${REDIS_MAXMEMORY:-64mb}
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --appendonly yes
      --requirepass $$(cat /run/secrets/redis_password)"
    secrets:
      - redis_password
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "sh", "-c", "redis-cli -a $$(cat /run/secrets/redis_password) ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped
    # --- Security Hardening ---
    cap_drop:
      - ALL
    cap_add:
      - SETGID
      - SETUID
      - DAC_OVERRIDE
    security_opt:
      - no-new-privileges:true
    networks:
      - app-net
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"

  # ── Prometheus (Monitoring) ─────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    ports:
      - "127.0.0.1:${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules.yml:/etc/prometheus/rules.yml:ro
      - ./prometheus/web.yml:/etc/prometheus/web.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-30d}'
      - '--web.config.file=/etc/prometheus/web.yml'
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:9090/-/healthy"]
      interval: 30s
      timeout: 5s
    restart: unless-stopped
    # --- Security Hardening ---
    read_only: true
    tmpfs:
      - /tmp:size=10m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

    networks:
      - monitor-net
    profiles:
      - monitoring
      - full
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Grafana (Dashboards) ────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - "127.0.0.1:${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD__FILE: /run/secrets/grafana_password
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-/grafana/}
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    secrets:
      - grafana_password
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped
    # --- Security Hardening ---
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

    networks:
      - monitor-net
    profiles:
      - full
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  policies:
    driver: local
  redis_data:
    driver: local
  telemetry_data:
    driver: local
  admin_data:
    driver: local
  reports:
    driver: local
  siem_stats:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  app-net:
    internal: true    # No internet access — internal communication only
  monitor-net:
    internal: true    # Prometheus/Grafana isolated network
  egress-net:
    driver: bridge    # Only proxy gets internet (for external backends)
