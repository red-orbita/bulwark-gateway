{{- if .Values.mtls.enabled }}
{{- /*
  mTLS Secrets for inter-service communication (proxy ↔ admin).
  
  Three modes:
    1. Auto-generated (default): Helm generates self-signed certs on install
    2. cert-manager: Creates Certificate resources for automatic renewal
    3. Pre-existing secrets: References customer-provided secrets
*/ -}}

{{- if and (not .Values.mtls.certManager) (not .Values.mtls.existingSecrets.ca) }}
{{- /*
  Mode 1: Auto-generated certificates (self-signed CA + service certs).
  NOTE: These are generated once at install time. Use cert-manager for rotation.
*/ -}}
---
# mTLS CA Certificate (shared trust anchor)
apiVersion: v1
kind: Secret
metadata:
  name: sentinel-mtls-ca
  namespace: {{ include "sentinel-gateway.namespace" . }}
  labels:
    {{- include "sentinel-gateway.labels" . | nindent 4 }}
    app.kubernetes.io/component: mtls
  annotations:
    helm.sh/resource-policy: keep
    sentinel-gateway.io/purpose: "Internal CA for inter-service mTLS"
type: Opaque
data:
  # CA certificate and key are generated externally via scripts/generate-mtls-certs.sh
  # This secret is a placeholder — populate it before enabling mTLS:
  #   kubectl create secret generic sentinel-mtls-ca \
  #     --from-file=ca.crt=./certs/mtls/ca.crt \
  #     -n sentinel-gateway
  ca.crt: {{ "" | b64enc | quote }}
---
# Proxy Server TLS Certificate
apiVersion: v1
kind: Secret
metadata:
  name: sentinel-proxy-mtls
  namespace: {{ include "sentinel-gateway.namespace" . }}
  labels:
    {{- include "sentinel-gateway.proxy.labels" . | nindent 4 }}
    app.kubernetes.io/component: mtls
  annotations:
    helm.sh/resource-policy: keep
type: kubernetes.io/tls
data:
  tls.crt: {{ "" | b64enc | quote }}
  tls.key: {{ "" | b64enc | quote }}
---
# Admin Server TLS Certificate
apiVersion: v1
kind: Secret
metadata:
  name: sentinel-admin-mtls
  namespace: {{ include "sentinel-gateway.namespace" . }}
  labels:
    {{- include "sentinel-gateway.admin.labels" . | nindent 4 }}
    app.kubernetes.io/component: mtls
  annotations:
    helm.sh/resource-policy: keep
type: kubernetes.io/tls
data:
  tls.crt: {{ "" | b64enc | quote }}
  tls.key: {{ "" | b64enc | quote }}
---
# Proxy Client Certificate (for proxy→admin calls)
apiVersion: v1
kind: Secret
metadata:
  name: sentinel-proxy-client-mtls
  namespace: {{ include "sentinel-gateway.namespace" . }}
  labels:
    {{- include "sentinel-gateway.proxy.labels" . | nindent 4 }}
    app.kubernetes.io/component: mtls
  annotations:
    helm.sh/resource-policy: keep
type: kubernetes.io/tls
data:
  tls.crt: {{ "" | b64enc | quote }}
  tls.key: {{ "" | b64enc | quote }}
---
# Admin Client Certificate (for admin→proxy calls)
apiVersion: v1
kind: Secret
metadata:
  name: sentinel-admin-client-mtls
  namespace: {{ include "sentinel-gateway.namespace" . }}
  labels:
    {{- include "sentinel-gateway.admin.labels" . | nindent 4 }}
    app.kubernetes.io/component: mtls
  annotations:
    helm.sh/resource-policy: keep
type: kubernetes.io/tls
data:
  tls.crt: {{ "" | b64enc | quote }}
  tls.key: {{ "" | b64enc | quote }}
{{- end }}

{{- if .Values.mtls.certManager }}
{{- /*
  Mode 2: cert-manager integration.
  Creates Certificate resources that are automatically issued and renewed.
  Requires cert-manager to be installed in the cluster.
*/ -}}
---
# Internal CA Issuer (self-signed root for inter-service certs)
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: sentinel-selfsigned-issuer
  namespace: {{ include "sentinel-gateway.namespace" . }}
  labels:
    {{- include "sentinel-gateway.labels" . | nindent 4 }}
    app.kubernetes.io/component: mtls
spec:
  selfSigned: {}
---
# CA Certificate (used as root for signing service certs)
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: sentinel-internal-ca
  namespace: {{ include "sentinel-gateway.namespace" . }}
  labels:
    {{- include "sentinel-gateway.labels" . | nindent 4 }}
    app.kubernetes.io/component: mtls
spec:
  isCA: true
  commonName: {{ .Values.mtls.issuerName }}
  secretName: sentinel-mtls-ca
  duration: {{ printf "%dh" (int .Values.mtls.certValidity) }}
  renewBefore: 720h  # 30 days before expiry
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: sentinel-selfsigned-issuer
    kind: Issuer
---
# CA Issuer (signs service certificates using the internal CA)
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: {{ .Values.mtls.issuerName }}
  namespace: {{ include "sentinel-gateway.namespace" . }}
  labels:
    {{- include "sentinel-gateway.labels" . | nindent 4 }}
    app.kubernetes.io/component: mtls
spec:
  ca:
    secretName: sentinel-mtls-ca
---
# Proxy Server Certificate
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: sentinel-proxy-mtls
  namespace: {{ include "sentinel-gateway.namespace" . }}
  labels:
    {{- include "sentinel-gateway.proxy.labels" . | nindent 4 }}
    app.kubernetes.io/component: mtls
spec:
  secretName: sentinel-proxy-mtls
  duration: {{ printf "%dh" (int .Values.mtls.certValidity) }}
  renewBefore: 720h
  commonName: proxy.{{ include "sentinel-gateway.namespace" . }}.svc.cluster.local
  dnsNames:
    - proxy.{{ include "sentinel-gateway.namespace" . }}.svc.cluster.local
    - proxy.{{ include "sentinel-gateway.namespace" . }}.svc
    - proxy.{{ include "sentinel-gateway.namespace" . }}
    - proxy
    - localhost
    - sentinel-proxy
  ipAddresses:
    - "127.0.0.1"
    - "::1"
  usages:
    - server auth
    - digital signature
    - key encipherment
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: {{ .Values.mtls.issuerName }}
    kind: Issuer
---
# Admin Server Certificate
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: sentinel-admin-mtls
  namespace: {{ include "sentinel-gateway.namespace" . }}
  labels:
    {{- include "sentinel-gateway.admin.labels" . | nindent 4 }}
    app.kubernetes.io/component: mtls
spec:
  secretName: sentinel-admin-mtls
  duration: {{ printf "%dh" (int .Values.mtls.certValidity) }}
  renewBefore: 720h
  commonName: admin.{{ include "sentinel-gateway.namespace" . }}.svc.cluster.local
  dnsNames:
    - admin.{{ include "sentinel-gateway.namespace" . }}.svc.cluster.local
    - admin.{{ include "sentinel-gateway.namespace" . }}.svc
    - admin.{{ include "sentinel-gateway.namespace" . }}
    - admin
    - localhost
    - sentinel-admin
  ipAddresses:
    - "127.0.0.1"
    - "::1"
  usages:
    - server auth
    - digital signature
    - key encipherment
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: {{ .Values.mtls.issuerName }}
    kind: Issuer
---
# Proxy Client Certificate (for proxy→admin calls)
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: sentinel-proxy-client-mtls
  namespace: {{ include "sentinel-gateway.namespace" . }}
  labels:
    {{- include "sentinel-gateway.proxy.labels" . | nindent 4 }}
    app.kubernetes.io/component: mtls
spec:
  secretName: sentinel-proxy-client-mtls
  duration: {{ printf "%dh" (int .Values.mtls.certValidity) }}
  renewBefore: 720h
  commonName: proxy.{{ include "sentinel-gateway.namespace" . }}.svc.cluster.local
  dnsNames:
    - proxy.{{ include "sentinel-gateway.namespace" . }}.svc.cluster.local
    - proxy.{{ include "sentinel-gateway.namespace" . }}
    - sentinel-proxy
  usages:
    - client auth
    - digital signature
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: {{ .Values.mtls.issuerName }}
    kind: Issuer
---
# Admin Client Certificate (for admin→proxy calls)
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: sentinel-admin-client-mtls
  namespace: {{ include "sentinel-gateway.namespace" . }}
  labels:
    {{- include "sentinel-gateway.admin.labels" . | nindent 4 }}
    app.kubernetes.io/component: mtls
spec:
  secretName: sentinel-admin-client-mtls
  duration: {{ printf "%dh" (int .Values.mtls.certValidity) }}
  renewBefore: 720h
  commonName: admin.{{ include "sentinel-gateway.namespace" . }}.svc.cluster.local
  dnsNames:
    - admin.{{ include "sentinel-gateway.namespace" . }}.svc.cluster.local
    - admin.{{ include "sentinel-gateway.namespace" . }}
    - sentinel-admin
  usages:
    - client auth
    - digital signature
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: {{ .Values.mtls.issuerName }}
    kind: Issuer
{{- end }}

{{- if .Values.mtls.existingSecrets.ca }}
{{- /*
  Mode 3: Pre-existing secrets.
  Customer provides their own CA and certificates.
  This section only documents the expected secret format — no resources created.
  
  Expected secrets:
    - {{ .Values.mtls.existingSecrets.ca }}:        key "ca.crt"
    - {{ .Values.mtls.existingSecrets.proxyCert }}: keys "tls.crt", "tls.key"
    - {{ .Values.mtls.existingSecrets.adminCert }}: keys "tls.crt", "tls.key"
*/ -}}
{{- end }}
{{- end }}
