{{- if and (eq .Values.admin.database.type "postgresql") .Values.admin.database.postgresql.internal (not .Values.admin.database.postgresql.host) }}
{{- $existingSecret := (lookup "v1" "Secret" (include "sentinel-gateway.namespace" .) "postgresql-credentials") -}}
{{- $pgPassword := "" -}}
{{- if and $existingSecret $existingSecret.data (index $existingSecret.data "postgresql-password") }}
{{- $pgPassword = (index $existingSecret.data "postgresql-password" | b64dec) -}}
{{- else }}
{{- $pgPassword = (.Values.admin.database.postgresql.password | default (randAlphaNum 32)) -}}
{{- end -}}
---
# PostgreSQL Secret
apiVersion: v1
kind: Secret
metadata:
  name: postgresql-credentials
  namespace: {{ include "sentinel-gateway.namespace" . }}
  labels:
    {{- include "sentinel-gateway.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
data:
  postgresql-password: {{ $pgPassword | b64enc | quote }}
  postgresql-url: {{ printf "postgresql://%s:%s@postgresql.%s.svc.cluster.local:%d/%s" .Values.admin.database.postgresql.username $pgPassword (include "sentinel-gateway.namespace" .) (int .Values.admin.database.postgresql.port) .Values.admin.database.postgresql.database | b64enc | quote }}
---
# PostgreSQL PVC
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgresql-data
  namespace: {{ include "sentinel-gateway.namespace" . }}
  labels:
    {{- include "sentinel-gateway.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.admin.database.postgresql.storage }}
---
# PostgreSQL Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgresql
  namespace: {{ include "sentinel-gateway.namespace" . }}
  labels:
    {{- include "sentinel-gateway.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
    app.kubernetes.io/name: postgresql
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: postgresql
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgresql
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: postgresql
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 70
        runAsGroup: 70
        fsGroup: 70
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgresql
          image: "{{ .Values.admin.database.postgresql.image.repository }}:{{ .Values.admin.database.postgresql.image.tag }}"
          imagePullPolicy: {{ .Values.admin.database.postgresql.image.pullPolicy }}
          ports:
            - name: tcp-pg
              containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_DB
              value: {{ .Values.admin.database.postgresql.database | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.admin.database.postgresql.username | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql-credentials
                  key: postgresql-password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          resources:
            {{- toYaml .Values.admin.database.postgresql.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.admin.database.postgresql.username | quote }}]
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.admin.database.postgresql.username | quote }}]
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgresql-data
---
# PostgreSQL Service
apiVersion: v1
kind: Service
metadata:
  name: postgresql
  namespace: {{ include "sentinel-gateway.namespace" . }}
  labels:
    {{- include "sentinel-gateway.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
spec:
  type: ClusterIP
  ports:
    - name: tcp-pg
      port: {{ .Values.admin.database.postgresql.port }}
      targetPort: tcp-pg
      protocol: TCP
  selector:
    app.kubernetes.io/name: postgresql
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
