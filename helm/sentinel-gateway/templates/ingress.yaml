{{- if .Values.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "sentinel-gateway.fullname" . }}
  namespace: {{ include "sentinel-gateway.namespace" . }}
  labels:
    {{- include "sentinel-gateway.labels" . | nindent 4 }}
  annotations:
    {{- if .Values.ingress.tls.certManager }}
    cert-manager.io/cluster-issuer: {{ .Values.ingress.tls.issuerName | quote }}
    {{- end }}
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.hosts.proxy }}
        - {{ .Values.ingress.hosts.admin }}
      secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
  rules:
    # Proxy API — main guardrail path
    - host: {{ .Values.ingress.hosts.proxy }}
      http:
        paths:
          - path: /v1
            pathType: Prefix
            backend:
              service:
                name: proxy
                port:
                  number: 8080
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: proxy
                port:
                  number: 8080
          {{- if .Values.monitoring.grafana.enabled }}
          - path: /grafana
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 3000
          {{- end }}
    # Admin portal — dedicated subdomain
    - host: {{ .Values.ingress.hosts.admin }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: admin
                port:
                  number: 8090
{{- end }}
