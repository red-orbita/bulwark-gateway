{{- /*
  SECURITY FIX (VULN 2.1): Generate all random values ONCE at the top and reuse.
  Each randAlphaNum call generates a DIFFERENT value per template render.
  Without this fix, proxy, admin, and redis get different passwords on fresh install.
  UPGRADE FIX: Use lookup to preserve existing secrets across helm upgrade.
*/ -}}
{{- $existingProxy := (lookup "v1" "Secret" (include "sentinel-gateway.namespace" .) "sentinel-proxy-secrets") -}}
{{- $existingAdmin := (lookup "v1" "Secret" (include "sentinel-gateway.namespace" .) "sentinel-admin-secrets") -}}
{{- $existingRedis := (lookup "v1" "Secret" (include "sentinel-gateway.namespace" .) "sentinel-redis-secrets") -}}
{{- $redisPassword := "" -}}
{{- if and $existingRedis $existingRedis.data (index $existingRedis.data "redis-password") }}
{{- $redisPassword = (index $existingRedis.data "redis-password" | b64dec) -}}
{{- else }}
{{- $redisPassword = (.Values.redis.password | default (randAlphaNum 32)) -}}
{{- end -}}
{{- $jwtSecret := "" -}}
{{- if and $existingProxy $existingProxy.data (index $existingProxy.data "jwt-secret") }}
{{- $jwtSecret = (index $existingProxy.data "jwt-secret" | b64dec) -}}
{{- else }}
{{- $jwtSecret = (.Values.secrets.jwtSecret | default (randAlphaNum 64)) -}}
{{- end -}}
{{- $apiKey := "" -}}
{{- if and $existingProxy $existingProxy.data (index $existingProxy.data "api-keys") }}
{{- $apiKey = (index $existingProxy.data "api-keys" | b64dec) -}}
{{- else }}
{{- $apiKey = (.Values.secrets.apiKey | default (randAlphaNum 48)) -}}
{{- end -}}
{{- $adminPassword := "" -}}
{{- if and $existingAdmin $existingAdmin.data (index $existingAdmin.data "admin-password") }}
{{- $adminPassword = (index $existingAdmin.data "admin-password" | b64dec) -}}
{{- else }}
{{- $adminPassword = (.Values.secrets.adminPassword | default (randAlphaNum 24)) -}}
{{- end -}}
{{- $securityPassword := "" -}}
{{- if and $existingAdmin $existingAdmin.data (index $existingAdmin.data "security-password") }}
{{- $securityPassword = (index $existingAdmin.data "security-password" | b64dec) -}}
{{- else }}
{{- $securityPassword = (.Values.secrets.securityPassword | default (randAlphaNum 24)) -}}
{{- end -}}
{{- $auditorPassword := "" -}}
{{- if and $existingAdmin $existingAdmin.data (index $existingAdmin.data "auditor-password") }}
{{- $auditorPassword = (index $existingAdmin.data "auditor-password" | b64dec) -}}
{{- else }}
{{- $auditorPassword = (.Values.secrets.auditorPassword | default (randAlphaNum 24)) -}}
{{- end -}}
{{- $dbEncryptionKey := "" -}}
{{- if and $existingAdmin $existingAdmin.data (index $existingAdmin.data "db-encryption-key") }}
{{- $dbEncryptionKey = (index $existingAdmin.data "db-encryption-key" | b64dec) -}}
{{- else }}
{{- $dbEncryptionKey = (.Values.secrets.dbEncryptionKey | default (randAlphaNum 32)) -}}
{{- end -}}
---
# Proxy Secrets — auto-generates random values if not provided
apiVersion: v1
kind: Secret
metadata:
  name: sentinel-proxy-secrets
  namespace: {{ include "sentinel-gateway.namespace" . }}
  labels:
    {{- include "sentinel-gateway.proxy.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
data:
  jwt-secret: {{ $jwtSecret | b64enc | quote }}
  api-keys: {{ $apiKey | b64enc | quote }}
  {{- if .Values.redis.enabled }}
  redis-password: {{ $redisPassword | b64enc | quote }}
  {{- else if and .Values.externalRedis.password (not .Values.externalRedis.existingSecret) }}
  redis-password: {{ .Values.externalRedis.password | b64enc | quote }}
  {{- else }}
  redis-password: {{ "" | b64enc | quote }}
  {{- end }}
  # Placeholder keys for threat intel feeds (configure post-install)
  urlhaus-key: {{ "" | b64enc | quote }}
  threatfox-key: {{ "" | b64enc | quote }}
  otx-key: {{ "" | b64enc | quote }}
  abuseipdb-key: {{ "" | b64enc | quote }}
---
# Admin Secrets
apiVersion: v1
kind: Secret
metadata:
  name: sentinel-admin-secrets
  namespace: {{ include "sentinel-gateway.namespace" . }}
  labels:
    {{- include "sentinel-gateway.admin.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
data:
  admin-jwt-secret: {{ $jwtSecret | b64enc | quote }}
  admin-password: {{ $adminPassword | b64enc | quote }}
  security-password: {{ $securityPassword | b64enc | quote }}
  auditor-password: {{ $auditorPassword | b64enc | quote }}
  {{- if .Values.redis.enabled }}
  redis-password: {{ $redisPassword | b64enc | quote }}
  {{- else if and .Values.externalRedis.password (not .Values.externalRedis.existingSecret) }}
  redis-password: {{ .Values.externalRedis.password | b64enc | quote }}
  {{- else }}
  redis-password: {{ "" | b64enc | quote }}
  {{- end }}
  api-keys: {{ $apiKey | b64enc | quote }}
  db-encryption-key: {{ $dbEncryptionKey | b64enc | quote }}
{{- if .Values.redis.enabled }}
---
# Redis Secrets (internal Redis only)
apiVersion: v1
kind: Secret
metadata:
  name: sentinel-redis-secrets
  namespace: {{ include "sentinel-gateway.namespace" . }}
  labels:
    {{- include "sentinel-gateway.redis.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
data:
  redis-password: {{ $redisPassword | b64enc | quote }}
{{- end }}
{{- if and (not .Values.redis.enabled) .Values.externalRedis.password (not .Values.externalRedis.existingSecret) }}
---
# External Redis Secret (password provided inline)
apiVersion: v1
kind: Secret
metadata:
  name: sentinel-redis-secrets
  namespace: {{ include "sentinel-gateway.namespace" . }}
  labels:
    {{- include "sentinel-gateway.labels" . | nindent 4 }}
    app.kubernetes.io/component: external-redis
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
data:
  redis-password: {{ .Values.externalRedis.password | b64enc | quote }}
{{- end }}
{{- if .Values.monitoring.grafana.enabled }}
---
# Monitoring Secrets
apiVersion: v1
kind: Secret
metadata:
  name: sentinel-monitoring-secrets
  namespace: {{ include "sentinel-gateway.namespace" . }}
  labels:
    {{- include "sentinel-gateway.labels" . | nindent 4 }}
    app.kubernetes.io/component: monitoring
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
data:
  grafana-password: {{ (.Values.monitoring.grafana.adminPassword | default (randAlphaNum 16)) | b64enc | quote }}
{{- end }}
