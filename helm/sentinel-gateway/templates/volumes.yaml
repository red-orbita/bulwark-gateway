---
# PVC: Policies (shared between proxy and admin)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: policies
  namespace: {{ include "sentinel-gateway.namespace" . }}
  labels:
    {{- include "sentinel-gateway.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  {{- if .Values.persistence.storageClass }}
  storageClassName: {{ .Values.persistence.storageClass | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.persistence.policies.size }}
---
# PVC: SIEM Stats (shared between proxy and admin)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: siem-stats
  namespace: {{ include "sentinel-gateway.namespace" . }}
  labels:
    {{- include "sentinel-gateway.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  {{- if .Values.persistence.storageClass }}
  storageClassName: {{ .Values.persistence.storageClass | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.persistence.siemStats.size }}
---
# PVC: Telemetry Data
apiVersion: v1
