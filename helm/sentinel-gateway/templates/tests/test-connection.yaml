{{/*
Helm test: Connection test
Validates that proxy and admin services are reachable and healthy.
Run with: helm test sentinel -n sentinel-gateway
*/}}
apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "sentinel-gateway.fullname" . }}-test-connection"
  namespace: {{ include "sentinel-gateway.namespace" . }}
  labels:
    {{- include "sentinel-gateway.labels" . | nindent 4 }}
    app.kubernetes.io/component: test
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: proxy-health
      image: curlimages/curl:8.5.0
      command:
        - /bin/sh
        - -c
        - |
          set -e
          echo "=== Sentinel Gateway Connection Tests ==="
          echo ""

          # Test 1: Proxy health endpoint
          echo "[1/4] Testing proxy health endpoint..."
          PROXY_RESP=$(curl -sf --max-time 10 \
            http://proxy.{{ include "sentinel-gateway.namespace" . }}.svc.cluster.local:8080/health)
          echo "  Proxy health: ${PROXY_RESP}"
          echo "  PASS: Proxy is healthy"
          echo ""

          # Test 2: Admin health endpoint
          echo "[2/4] Testing admin health endpoint..."
          ADMIN_RESP=$(curl -sf --max-time 10 \
            http://admin.{{ include "sentinel-gateway.namespace" . }}.svc.cluster.local:8090/admin/health)
          echo "  Admin health: ${ADMIN_RESP}"
          echo "  PASS: Admin is healthy"
          echo ""

          # Test 3: Proxy stats endpoint
          echo "[3/4] Testing proxy stats endpoint..."
          STATS_RESP=$(curl -sf --max-time 10 \
            http://proxy.{{ include "sentinel-gateway.namespace" . }}.svc.cluster.local:8080/health/stats)
          echo "  Proxy stats: ${STATS_RESP}"
          echo "  PASS: Stats endpoint responding"
          echo ""

          {{- if .Values.redis.enabled }}
          # Test 4: Redis connectivity (internal)
          echo "[4/4] Testing Redis connectivity..."
          REDIS_CHECK=$(curl -sf --max-time 10 \
            http://admin.{{ include "sentinel-gateway.namespace" . }}.svc.cluster.local:8090/admin/health/detailed 2>/dev/null || echo '{"redis":"unavailable"}')
          echo "  Redis status: ${REDIS_CHECK}"
          if echo "${REDIS_CHECK}" | grep -q '"connected"'; then
            echo "  PASS: Redis is connected"
          else
            echo "  WARN: Redis may not be connected (non-blocking)"
          fi
          {{- else }}
          # Test 4: External Redis (skip in-cluster check)
          echo "[4/4] External Redis configured — skipping in-cluster Redis check"
          echo "  PASS: External Redis connectivity validated by proxy startup"
          {{- end }}

          echo ""
          echo "=== All connection tests passed ==="
