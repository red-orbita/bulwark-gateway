# Sentinel Gateway — Notification Channels Configuration
# 
# This file defines alert notification channels managed via GitOps.
# Channels defined here are merged with those managed via the Admin UI.
# Admin UI channels are stored in shared/notifications/channels.json
#
# Supported types: slack, teams, discord, pagerduty, opsgenie, telegram, google_chat, email, generic
#
# Routing options:
#   min_severity: low | medium | high | critical (only alert at this level or above)
#   verdicts: [block, warn, redact] (which verdicts trigger notification)
#   tenants: [] (empty = all tenants, or list specific tenant IDs)
#   dedup_window_seconds: 300 (suppress duplicate alerts within this window)

channels: []
  # --- Example: Slack ---
  # - id: slack-security
  #   name: "#security-alerts"
  #   type: slack
  #   enabled: true
  #   url: "https://hooks.slack.example.com/services/TXXXXXXXX/BXXXXXXXX/placeholder-not-real"
  #   min_severity: high
  #   verdicts: [block, warn]
  #   tenants: []  # all tenants
  #   dedup_window_seconds: 300

  # --- Example: Microsoft Teams ---
