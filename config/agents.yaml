defaults:
  backend_url: ${SENTINEL_BACKEND_URL:-http://ollama:11434}
  timeout: 120.0
  auth_header: null
  health_endpoint: /health
tenants:
  default-corp:
    quotas:
      max_concurrent_requests: 50
      max_tokens_per_day: 1000000
      max_request_size_bytes: 102400  # 100KB
      allowed_models: ["tinyllama", "gpt-4", "claude-3"]
      priority_weight: 1.0
      rate_limit_rpm: 120  # Override global rate limit
    agents:
      support-bot:
        path_prefix: /v1
        timeout: 30.0
        model: tinyllama
        health_endpoint: /
        description: Ollama local LLM for support
        status: active
      code-assistant:
        path_prefix: /v1
        timeout: 5.0
        backend_url: http://nonexistent-backend:9999
        model: tinyllama
        health_endpoint: /
        description: Ollama for code generation (with fallback)
        status: active
        max_retries: 2
        fallback_backends:
          - backend_url: ${SENTINEL_BACKEND_URL:-http://ollama:11434}
            path_prefix: /v1
            timeout: 120.0
    _meta:
      status: active
  healthcare-corp:
    quotas:
      max_concurrent_requests: 30
      max_tokens_per_day: 500000
      max_request_size_bytes: 51200  # 50KB
      allowed_models: ["tinyllama"]
      priority_weight: 0.8
      rate_limit_rpm: 60
    agents:
      patient-assistant:
        path_prefix: /v1
        timeout: 30.0
        model: tinyllama
        health_endpoint: /
        description: Patient-facing healthcare assistant
        status: active
      medical-researcher:
        path_prefix: /v1
        timeout: 60.0
        model: tinyllama
        health_endpoint: /
        description: Medical research assistant
        status: active
    _meta:
      status: active
