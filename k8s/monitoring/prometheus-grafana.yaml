---
# Prometheus — StatefulSet
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: prometheus
  namespace: sentinel-gateway
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: sentinel-gateway
    app.kubernetes.io/component: monitoring
spec:
  serviceName: prometheus
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: prometheus
  template:
    metadata:
      labels:
        app.kubernetes.io/name: prometheus
        app.kubernetes.io/part-of: sentinel-gateway
        app.kubernetes.io/component: monitoring
    spec:
      automountServiceAccountToken: false  # C-04: No SA token needed
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: prometheus
          image: prom/prometheus:v2.51.0
          args:
            - '--config.file=/etc/prometheus/prometheus.yml'
            - '--storage.tsdb.retention.time=30d'
            - '--web.config.file=/etc/prometheus/web.yml'
          ports:
            - name: http
              containerPort: 9090
              protocol: TCP
          resources:
            limits:
              memory: 512Mi
              cpu: "500m"
            requests:
              memory: 256Mi
              cpu: "100m"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: prometheus-data
              mountPath: /prometheus
            - name: prometheus-config
              mountPath: /etc/prometheus
              readOnly: true
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: prometheus-config
          configMap:
            name: prometheus-config
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 10Mi
  volumeClaimTemplates:
    - metadata:
        name: prometheus-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
---
# Prometheus ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: sentinel-gateway
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: sentinel-gateway
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    rule_files:
      - "rules.yml"

    scrape_configs:
      - job_name: "sentinel-proxy"
        static_configs:
          - targets: ["proxy.sentinel-gateway.svc.cluster.local:8080"]
        metrics_path: "/health/metrics"
        scrape_interval: 10s

      - job_name: "sentinel-admin"
        static_configs:
          - targets: ["admin.sentinel-gateway.svc.cluster.local:8090"]
        metrics_path: "/admin/health/metrics"
        scrape_interval: 10s

  rules.yml: |
    groups: []

  web.yml: |
    # Basic auth disabled in K8s (use NetworkPolicy instead)
    {}
---
# Prometheus Service
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: sentinel-gateway
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: sentinel-gateway
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 9090
      targetPort: http
      protocol: TCP
  selector:
    app.kubernetes.io/name: prometheus
---
# Grafana — Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: sentinel-gateway
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: sentinel-gateway
    app.kubernetes.io/component: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: grafana
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grafana
        app.kubernetes.io/part-of: sentinel-gateway
        app.kubernetes.io/component: monitoring
    spec:
      automountServiceAccountToken: false  # C-04: No SA token needed
      securityContext:
        runAsNonRoot: true
        runAsUser: 472
        fsGroup: 472
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: grafana
          image: grafana/grafana:10.4.0
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sentinel-monitoring-secrets
                  key: grafana-password
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "false"
            - name: GF_SERVER_ROOT_URL
              value: "/grafana/"
            - name: GF_SERVER_SERVE_FROM_SUB_PATH
              value: "true"
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          resources:
            limits:
              memory: 256Mi
              cpu: "500m"
            requests:
              memory: 128Mi
              cpu: "100m"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: grafana-data
              mountPath: /var/lib/grafana
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: grafana-data
          persistentVolumeClaim:
            claimName: grafana-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-data
  namespace: sentinel-gateway
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
# Grafana Service
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: sentinel-gateway
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: sentinel-gateway
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 3000
      targetPort: http
      protocol: TCP
  selector:
    app.kubernetes.io/name: grafana
