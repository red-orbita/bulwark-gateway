---
# Redis ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
  namespace: sentinel-gateway
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: sentinel-gateway
data:
  redis.conf: |
    maxmemory 64mb
    maxmemory-policy allkeys-lru
    save 60 1000
    appendonly yes
    protected-mode yes
    # H-05: Block dangerous commands entirely
    rename-command FLUSHALL ""
    rename-command FLUSHDB ""
    rename-command CONFIG ""
    rename-command DEBUG ""
    rename-command KEYS ""
    rename-command SHUTDOWN ""
    rename-command SLAVEOF ""
    rename-command REPLICAOF ""
    rename-command MODULE ""
    rename-command SCRIPT ""
    rename-command EVAL ""
    rename-command EVALSHA ""
---
# Redis Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: sentinel-gateway
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: sentinel-gateway
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis
        app.kubernetes.io/part-of: sentinel-gateway
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: redis
          image: redis:7-alpine
          command:
            - sh
            - -c
            - |
              redis-server /etc/redis/redis.conf --requirepass "$(cat /run/secrets/redis-password)"
          ports:
            - containerPort: 6379
              protocol: TCP
          resources:
            limits:
              memory: 128Mi
              cpu: "500m"
            requests:
              memory: 64Mi
              cpu: "100m"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: redis-data
              mountPath: /data
            - name: redis-config
              mountPath: /etc/redis
              readOnly: true
            - name: redis-secret
              mountPath: /run/secrets
              readOnly: true
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - redis-cli -a "$(cat /run/secrets/redis-password)" ping
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - redis-cli -a "$(cat /run/secrets/redis-password)" ping
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: redis-data
        - name: redis-config
          configMap:
            name: redis-config
        - name: redis-secret
          secret:
            secretName: sentinel-redis-secrets
            items:
              - key: redis-password
                path: redis-password
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 10Mi
---
# Redis Service
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: sentinel-gateway
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: sentinel-gateway
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: 6379
      protocol: TCP
  selector:
    app.kubernetes.io/name: redis
---
# Redis PVC
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-data
  namespace: sentinel-gateway
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: sentinel-gateway
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
