# Sentinel Gateway - Prometheus Configuration
# Standalone deployment (docker-compose)

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

rule_files:
  - "rules.yml"

scrape_configs:
  - job_name: "sentinel-proxy"
    static_configs:
      - targets: ["proxy:8080"]
    metrics_path: "/health/metrics"
    scrape_interval: 10s

  - job_name: "sentinel-admin"
    static_configs:
      - targets: ["admin:8090"]
    metrics_path: "/admin/health/metrics"
    scrape_interval: 10s

  - job_name: "sentinel-redis"
    static_configs:
      - targets: ["redis:6379"]
    metrics_path: "/metrics"
    scrape_interval: 30s
